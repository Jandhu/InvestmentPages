<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental ROI & Equity Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { grid-column: span 2; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; font-weight: bold; }
        button:hover { background: #27ae60; }
        .results { margin-top: 30px; padding: 20px; border-top: 2px solid #eee; display: none; }
        .metric-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #2ecc71; margin-bottom: 10px; }
        .metric-value { font-size: 1.4em; font-weight: bold; color: #2c3e50; }
        h2 { color: #2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
    </style>
    <script src="navbar.js"></script>
</head>
<body>

<div class="container">
    <h2>Rental Property Calculator</h2>
    <div class="grid">
        <div class="input-group">
            <label>Property Value ($)</label>
            <input type="number" id="propValue" value="300000">
        </div>
        <div class="input-group">
            <label>Down Payment (%)</label>
            <input type="number" id="downPayPct" value="20">
        </div>
        <div class="input-group">
            <label>Monthly Rent ($)</label>
            <input type="number" id="monthlyRent" value="2500">
        </div>
        <div class="input-group">
            <label>Mortgage Interest Rate (%)</label>
            <input type="number" id="mortgageRate" value="6.5" step="0.1">
        </div>
        <div class="input-group">
            <label>Annual Property Tax Rate (%)</label>
            <input type="number" id="taxRate" value="1.2" step="0.1">
        </div>
        <div class="input-group">
            <label>Annual Insurance ($)</label>
            <input type="number" id="insurance" value="1200">
        </div>
        <div class="input-group">
            <label>Monthly HOA Fee ($)</label>
            <input type="number" id="hoa" value="0">
        </div>
        <div class="input-group">
            <label>Management Fee (%)</label>
            <input type="number" id="mgmtFee" value="10">
        </div>
        <button onclick="calculate()">Calculate Annual Returns</button>
    </div>

    <div id="results" class="results">
        <div class="grid">
            <div class="metric-card">
                <label>Annual Net Cash Flow</label>
                <div class="metric-value" id="resCashFlow"></div>
                <small>Cash-on-Cash Return: <span id="resCashReturn"></span></small>
            </div>
            <div class="metric-card" style="border-left-color: #3498db;">
                <label>Year 1 Equity Build-up (Principal)</label>
                <div class="metric-value" id="resEquity"></div>
                <small>Equity Return: <span id="resEquityReturn"></span></small>
            </div>
        </div>
        <div class="metric-card" style="border-left-color: #f1c40f; margin-top: 10px;">
            <label>Total Annual Return (Combined)</label>
            <div class="metric-value" id="resTotalReturn"></div>
        </div>
    </div>
</div>

<script>
function calculate() {
    // Inputs
    const propValue = parseFloat(document.getElementById('propValue').value);
    const downPayPct = parseFloat(document.getElementById('downPayPct').value) / 100;
    const monthlyRent = parseFloat(document.getElementById('monthlyRent').value);
    const interestRate = parseFloat(document.getElementById('mortgageRate').value) / 100 / 12;
    const taxRate = parseFloat(document.getElementById('taxRate').value) / 100;
    const annualInsurance = parseFloat(document.getElementById('insurance').value);
    const hoa = parseFloat(document.getElementById('hoa').value);
    const mgmtPct = parseFloat(document.getElementById('mgmtFee').value) / 100;

    // Financial Foundations
    const downPayment = propValue * downPayPct;
    const loanAmount = propValue - downPayment;
    const loanTermMonths = 30 * 12;

    // Monthly Mortgage (P+I)
    const monthlyPI = (loanAmount * interestRate) / (1 - Math.pow(1 + interestRate, -loanTermMonths));
    
    // Monthly Expenses
    const monthlyTaxes = (propValue * taxRate) / 12;
    const monthlyIns = annualInsurance / 12;
    const monthlyMgmt = monthlyRent * mgmtPct;
    
    const totalMonthlyOutflow = monthlyPI + monthlyTaxes + monthlyIns + hoa + monthlyMgmt;
    const monthlyCashFlow = monthlyRent - totalMonthlyOutflow;
    
    // Equity Build-up (Year 1 Principal calculation)
    // Formula for Year 1 Interest: approx loanAmount * annualRate
    const firstYearInterest = loanAmount * (interestRate * 12);
    const firstYearTotalPayments = monthlyPI * 12;
    const firstYearPrincipal = firstYearTotalPayments - firstYearInterest;

    // Annual Totals
    const annualCashFlow = monthlyCashFlow * 12;
    const cashOnCashReturn = (annualCashFlow / downPayment) * 100;
    const equityReturn = (firstYearPrincipal / downPayment) * 100;

    // Display
    document.getElementById('results').style.display = 'block';
    document.getElementById('resCashFlow').innerText = `$${annualCashFlow.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    document.getElementById('resCashReturn').innerText = `${cashOnCashReturn.toFixed(2)}%`;
    document.getElementById('resEquity').innerText = `$${firstYearPrincipal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    document.getElementById('resEquityReturn').innerText = `${equityReturn.toFixed(2)}%`;
    document.getElementById('resTotalReturn').innerText = `${(cashOnCashReturn + equityReturn).toFixed(2)}%`;
}
</script>

</body>
</html>
